<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - E-Commerce</title>
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/background.css">
    <link rel="stylesheet" href="../../../css/website.css">
    <!-- Custom Styles Replaced by Tailwind CSS -->
</head>

<body class="auto-retro-bg flex items-center justify-center min-h-screen relative antialiased" data-intensity="low">
    <div class="w-full max-w-md p-8 bg-background/95 backdrop-blur border rounded-xl shadow-2xl z-10 mx-4">
        <h2 class="text-2xl font-bold tracking-tight text-center mb-6 text-primary"
            style="font-family:var(--font-main);">ADMIN PANEL</h2>
        <form id="loginForm" class="space-y-4">
            <div class="space-y-2">
                <label for="username" class="text-sm font-medium leading-none">Usuario</label>
                <input type="text" id="username" name="username" required
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
            </div>
            <div class="space-y-2">
                <label for="password" class="text-sm font-medium leading-none">Contraseña</label>
                <input type="password" id="password" name="password" required
                    class="flex h-10 w-full rounded-md border border-input bg-background px-3 py-2 text-sm ring-offset-background placeholder:text-muted-foreground focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2">
            </div>
            <div class="pt-4">
                <button type="submit"
                    class="w-full bg-primary text-primary-foreground hover:bg-primary/90 inline-flex items-center justify-center rounded-md font-bold text-base shadow-sm ring-offset-background transition-colors focus-visible:outline-none focus-visible:ring-2 focus-visible:ring-ring focus-visible:ring-offset-2 h-10 px-4 py-2 uppercase tracking-wide">
                    Ingresar
                </button>
            </div>
            <p class="text-destructive text-sm font-medium text-center mt-4 hidden" id="errorMsg"></p>
        </form>
        <div class="mt-6 text-center">
            <a href="../../../index.html"
                class="text-muted-foreground hover:text-foreground text-sm transition-colors">&larr; Volver al
                inicio</a>
        </div>
    </div>

    <script src="../../../js/background.js"></script>
    <script>
        const API_URL = 'http://localhost:3000/api/auth/login';

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok) {
                    localStorage.setItem('token', data.accessToken);
                    localStorage.setItem('user', JSON.stringify(data));
                    window.location.href = '../../../index.html';
                } else {
                    errorMsg.textContent = data.message || 'Error al iniciar sesión';
                    errorMsg.style.display = 'block';
                }
            } catch (error) {
                console.error(error);
                errorMsg.textContent = 'Error de conexión';
                errorMsg.style.display = 'block';
            }
        });
    </script>
</body>

</html>
