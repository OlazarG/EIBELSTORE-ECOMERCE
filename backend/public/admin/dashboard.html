<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin</title>
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/background.css">
    <link rel="stylesheet" href="../../../css/website.css">
    <link rel="stylesheet" href="css/dashboard.css">
    <link rel="stylesheet" href="../../../css/whatsapp-button.css">
</head>

<body class="auto-retro-bg" data-intensity="low">
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-brand">
                <span>⚡</span> EIBELSTORE
            </div>

            <div class="sidebar-section">
                <h4>General</h4>
                <ul>
                    <li><a href="../../../products.html">🛍️ Ver Tienda</a></li>
                </ul>
            </div>

            <div class="sidebar-section">
                <h4>ADMIN</h4>
                <ul>
                    <li><a href="#" class="active" id="navInventoryBtn">📦 Inventario</a></li>
                    <li><a href="#" id="navUserBtn">👤 Gestionar Usuario</a></li>
                    <li><a href="#">📊 Manage Statistics</a></li>
                </ul>
            </div>

            <div style="margin-top: auto;">
                <ul>
                    <li><a href="#" id="logoutBtn">🚪 Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <!-- Products View -->
            <div id="productsView">
                <div class="header">
                    <h1>Manage your products</h1>
                    <button class="btn-primary" id="addProductBtn">Add Product ⊕</button>
                </div>

                <div id="productsGrid" class="products-grid">
                    <!-- Products will be loaded here -->
                </div>
            </div>

            <!-- User Management View -->
            <div id="userManagementView" style="display: none;">
                <div class="header">
                    <h1>Gestionar Usuario</h1>
                </div>
                <div style="background: rgba(255, 255, 255, 0.05); padding: 20px; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); max-width: 500px; margin-top: 20px;">
                    <form id="updatePasswordForm" class="product-form">
                        <div class="form-group" style="margin-bottom: 15px;">
                            <label>Usuario (Admin)</label>
                            <input type="text" value="admin" disabled style="background: rgba(0,0,0,0.5); color: #999; cursor: not-allowed;">
                        </div>
                        <div class="form-group" style="margin-bottom: 20px;">
                            <label>Nueva Contraseña</label>
                            <input type="password" id="newAdminPassword" required placeholder="Ingresa la nueva contraseña">
                        </div>
                        <button type="submit" class="btn-primary" style="width: 100%;">Guardar Contraseña</button>
                        <p id="passwordUpdateMsg" style="margin-top: 15px; text-align: center; display: none; font-size: 0.9rem;"></p>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close close-modal">&times;</span>
            <h2 id="modalTitle">Nuevo Producto</h2>
            <form id="productForm" class="product-form">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="category" name="category" required>
                        <option value="Anillos">Anillos</option>
                        <option value="Collares">Collares</option>
                        <option value="Relojes">Relojes</option>
                        <option value="Colgantes">Colgantes</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subcategoría</label>
                    <input type="text" id="subcategory" name="subcategory" placeholder="Ej: Plata 925">
                </div>
                <div class="form-group">
                    <label>Precio (Gs.)</label>
                    <input type="number" id="price" name="price" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" name="stock" value="1" required>
                </div>

                <!-- Row 2 -->
                <div class="form-group">
                    <label>Badge</label>
                    <input type="text" id="badge" name="badge" placeholder="Ej: NUEVO">
                </div>

                <div class="form-group">
                    <label>Descuento (%)</label>
                    <input type="number" id="discount_percentage" name="discount_percentage" value="0" min="0" max="100">
                </div>

                <div class="form-group col-span-2">
                    <label>Descripción</label>
                    <textarea id="description" name="description" rows="2" placeholder="Describe el producto..."></textarea>
                </div>

                <!-- Row 3 -->
                <div class="form-group">
                    <label>Estado</label>
                    <div style="display: flex; align-items: center; gap: 10px; height: 100%;">
                        <input type="checkbox" id="is_active" name="is_active" checked
                            style="width: 20px; height: 20px; cursor: pointer;">
                        <span style="color: white; font-size: 0.9rem;">Activo en tienda</span>
                    </div>
                </div>

                <div class="form-group col-span-full">
                    <label>Imágenes Actuales</label>
                    <div id="existingImagePreviews" style="margin-top: 5px; display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 15px;"></div>
                    
                    <label>Agregar Nuevas Imágenes</label>
                    <input type="file" id="images" name="images" multiple accept="image/*">
                    <div id="imagePreviews" style="margin-top: 10px; display: flex; flex-wrap: wrap; gap: 10px;"></div>
                </div>

                <div class="col-span-full" style="text-align: right; margin-top: 20px; padding-top: 20px; border-top: 1px solid var(--border-color);">
                    <button type="button" class="btn-secondary close-modal" style="margin-right: 10px;">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar Producto</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
    <script src="../../../js/whatsapp-button.js"></script>
</body>

</html>
