<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Admin</title>
    <link rel="stylesheet" href="../../../css/base.css">
    <link rel="stylesheet" href="../../../css/background.css">
    <link rel="stylesheet" href="../../../css/website.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>

<body class="auto-retro-bg" data-intensity="low">
    <div class="admin-container">
        <div class="sidebar">
            <div class="sidebar-brand">
                <span>⚡</span> EIBELSTORE
            </div>

            <div class="sidebar-section">
                <h4>General</h4>
                <ul>
                    <li><a href="../../../products.html">🛍️ Ver Tienda</a></li>
                </ul>
            </div>

            <div class="sidebar-section">
                <h4>ADMIN</h4>
                <ul>
                    <li><a href="#" class="active">📦 Inventario</a></li>
                    <li><a href="#">📊 Manage Statistics</a></li>
                </ul>
            </div>

            <div style="margin-top: auto;">
                <ul>
                    <li><a href="#" id="logoutBtn">🚪 Cerrar Sesión</a></li>
                </ul>
            </div>
        </div>

        <div class="main-content">
            <div class="header">
                <h1>Manage your products</h1>
                <button class="btn-primary" id="addProductBtn">Add Product ⊕</button>
            </div>

            <div id="productsGrid" class="products-grid">
                <!-- Products will be loaded here -->
            </div>
        </div>
    </div>

    <!-- Product Modal -->
    <div id="productModal" class="modal">
        <div class="modal-content">
            <span class="close close-modal">&times;</span>
            <h2 id="modalTitle">Nuevo Producto</h2>
            <form id="productForm" style="display: grid; grid-template-columns: repeat(5, 1fr); gap: 15px;">
                <input type="hidden" id="productId">

                <div class="form-group">
                    <label>Título</label>
                    <input type="text" id="title" name="title" required>
                </div>
                <div class="form-group">
                    <label>Categoría</label>
                    <select id="category" name="category" required>
                        <option value="Anillos">Anillos</option>
                        <option value="Collares">Collares</option>
                        <option value="Relojes">Relojes</option>
                        <option value="Colgantes">Colgantes</option>
                        <option value="Accesorios">Accesorios</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Subcategoría</label>
                    <input type="text" id="subcategory" name="subcategory" placeholder="Ej: Plata 925">
                </div>
                <div class="form-group">
                    <label>Precio (Gs.)</label>
                    <input type="number" id="price" name="price" required>
                </div>
                <div class="form-group">
                    <label>Stock</label>
                    <input type="number" id="stock" name="stock" value="1" required>
                </div>

                <!-- Row 2 -->
                <div class="form-group">
                    <label>Badge</label>
                    <input type="text" id="badge" name="badge" placeholder="Ej: NUEVO">
                </div>

                <div class="form-group">
                    <label>Descuento (%)</label>
                    <input type="number" id="discount_percentage" name="discount_percentage" value="0" min="0" max="100">
                </div>

                <div class="form-group" style="grid-column: span 3;">
                    <label>Descripción</label>
                    <textarea id="description" name="description" rows="1" style="height: 42px;"></textarea>
                </div>

                <!-- Row 3 -->
                <div class="form-group" style="grid-column: span 1;">
                    <label>Estado</label>
                    <div style="display: flex; align-items: center; gap: 10px; margin-top: 10px;">
                        <input type="checkbox" id="is_active" name="is_active" checked
                            style="width: 20px; height: 20px;">
                        <span style="color: white; font-size: 0.9rem;">Activo</span>
                    </div>
                </div>

                <div class="form-group" style="grid-column: span 4;">
                    <label>Imágenes</label>
                    <input type="file" id="images" name="images" multiple accept="image/*">
                    <div id="imagePreviews" style="margin-top: 10px; display: flex; flex-wrap: wrap;"></div>
                </div>

                <div style="grid-column: span 5; text-align: right; margin-top: 10px;">
                    <button type="button" class="close-modal">Cancelar</button>
                    <button type="submit" class="btn-primary">Guardar</button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>

</html>
