# Nginx Server Block for EIBELSTORE
# Place this file at: /etc/nginx/sites-available/eibelstore
# Then enable it: sudo ln -s /etc/nginx/sites-available/eibelstore /etc/nginx/sites-enabled/
# Test config: sudo nginx -t
# Reload: sudo systemctl reload nginx

server {
    listen 80;
    server_name tudominio.com www.tudominio.com;

    # Redirect HTTP to HTTPS (uncomment after Certbot is configured)
    # return 301 https://$host$request_uri;

    # Proxy to Node.js backend
    location /api/ {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Body size limit for file uploads (match your multer limit)
        client_max_body_size 10M;
    }

    # Serve the frontend static files
    location / {
        root /var/www/eibelstore;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}

# HTTPS block (configured automatically by Certbot after: sudo certbot --nginx -d tudominio.com)
