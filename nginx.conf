server {
    listen 80;
    server_name eibelstore.com www.eibelstore.com;

    # Máximo tamaño de subida (importante para fotos de productos)
    client_max_body_size 10M;

    # 1. PROXY PARA EL BACKEND (API)
    location /api/ {
        proxy_pass http://localhost:3000; # CAMBIADO: de 'app' a 'localhost'
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # 2. SERVIR FRONTEND (ESTÁTICOS)
    # Si tu frontend está en una carpeta 'public' o 'build' dentro del repo:
    location / {
        root /var/www/eibelstore/client/dist; # AJUSTA ESTA RUTA a donde esté tu index.html
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # 3. SEGURIDAD ADICIONAL (Opcional pero recomendado)
    location ~ /\.ht {
        deny all;
    }
}